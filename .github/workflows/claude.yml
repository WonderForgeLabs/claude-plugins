name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: true

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          custom_instructions: |
            ## Plugin Development Standards

            This is a Claude Code plugin repository. When making changes, follow these conventions:

            1. **Config pattern**: Plugins read config from `.claude/{plugin-name}/config.yaml` via yq.
               Defaults ship in `defaults/config.yaml` within each plugin.
            2. **Hook scripts**: Extract hook logic to `hooks/scripts/*.sh`, not inline commands.
               All hooks must use `Edit|Write|MultiEdit` matchers.
            3. **yq resolution**: Try native yq, then `docker run --rm -i mikefarah/yq`, then warn and exit 0.
            4. **Never block Claude**: Hooks exit 0 on all non-fatal conditions.

            ## GitHub Actions Workflow File Changes

            IMPORTANT: You do NOT have permission to modify files in `.github/workflows/`.

            If a task requires changes to GitHub Actions workflow files:

            1. DO NOT attempt to edit, write, or commit changes to workflow files
            2. Instead, create a comment on the PR that:
               - Mentions @copilot to delegate the work
               - Clearly describes what changes are needed
               - Includes the complete file contents in a collapsible section
               - Instructs @copilot to make the changes directly in the current branch

          claude_args: |
            --max-turns 50 --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,mcp__github__update_issue,mcp__github__issue_write,Bash(git:*),Bash(gh:*),Bash(jq:*),Bash(yq:*),Bash(shellcheck:*),Bash(docker:*)" --model "claude-opus-4-6"

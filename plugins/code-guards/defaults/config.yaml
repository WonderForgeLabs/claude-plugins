guards:
  env_files:
    enabled: true
    patterns:
      - "*.env"
      - "*.env.*"
      - "*secrets.json"
      - "*secrets.yaml"
      - "*secrets.yml"
      - "*secrets.env"
      - "*.secret"
  generated_code:
    enabled: true
    # NOTE: */bin/*, */build/*, */dist/* may match legitimate source paths
    # in some projects (e.g. Rust src/bin/, build scripts). Review and
    # adjust these patterns per project as needed.
    patterns:
      - "*/Generated/*"
      - "*/obj/*"
      - "*/bin/*"
      - "*/dist/*"
      - "*/build/*"
  lock_files:
    enabled: true
    patterns:
      - "yarn.lock"
      - "*/yarn.lock"
      - "package-lock.json"
      - "*/package-lock.json"
      - "packages.lock.json"
      - "*/packages.lock.json"
      - "pnpm-lock.yaml"
      - "*/pnpm-lock.yaml"
      - "Cargo.lock"
      - "*/Cargo.lock"
      - "go.sum"
      - "*/go.sum"
      - "poetry.lock"
      - "*/poetry.lock"
      - "Gemfile.lock"
      - "*/Gemfile.lock"
      - "composer.lock"
      - "*/composer.lock"
  shell_scripts:
    enabled: true
    shellcheck_severity: warning
